<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UWCPen — Framework Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0a0a0f;
      --surface:      #0f0f18;
      --surface-2:    #14141f;
      --surface-3:    #1a1a28;
      --border:       #1f1f30;
      --border-2:     #2a2a40;
      --text-dim:     #5c5c80;
      --text:         #9090b8;
      --text-2:       #c0c0d8;
      --text-bright:  #eeeeff;

      --accent:       #7c6aff;
      --accent-soft:  rgba(124,106,255,0.15);
      --accent-glow:  rgba(124,106,255,0.35);

      --green:  #34d399;
      --amber:  #f59e0b;
      --red:    #f87171;
      --blue:   #60a5fa;

      --mono: 'JetBrains Mono', monospace;
      --sans: 'Syne', sans-serif;
      --radius: 7px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--mono);
      color: var(--text-bright);
    }

    uwc-playground {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── Boot overlay ── */
    #boot-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #boot-overlay.fade-out { opacity: 0; pointer-events: none; }
    .boot-logo {
      font-family: var(--sans);
      font-size: 28px; font-weight: 800;
      color: var(--text-bright);
      letter-spacing: -0.03em;
    }
    .boot-logo span { color: var(--accent); }
    .boot-spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border-2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .boot-msg { font-size: 12px; color: var(--text-dim); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Split.js gutters (global scope; Split appends gutters into light DOM) ── */
    .gutter {
      background: var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 5;
      transition: background 0.15s;
    }
    .gutter::after {
      content: '';
      position: absolute; inset: 0;
      opacity: 0;
      background: var(--accent);
      transition: opacity 0.15s;
    }
    .gutter:hover::after, .gutter:active::after { opacity: 1; }
    .gutter.gutter-horizontal { cursor: col-resize; }
    .gutter.gutter-vertical   { cursor: row-resize; }
  </style>
</head>
<body>

<div id="boot-overlay">
  <div class="boot-logo">UWC<span>Pen</span></div>
  <div class="boot-spinner"></div>
  <div class="boot-msg">Loading compiler &amp; editors…</div>
</div>

<uwc-playground></uwc-playground>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
