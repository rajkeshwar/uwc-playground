<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>UWCPen Remote</title>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f0f0f5; gap: 12px; }
    h1  { margin: 0; font-size: 1.4rem; }
    p   { margin: 0; color: #666; font-size: 0.9rem; }
    button[type="submit"] { padding: 12px 36px; font-size: 1rem; font-weight: 700; background: #7c6aff; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
    button[type="submit"]:hover { filter: brightness(1.12); }
  </style>
</head>
<body>
  <h1>UWCPen Remote POST</h1>
  <p>Sends an ON/OFF toggle demo for <strong>Lit · React · Vue · Angular</strong> to localhost:8080</p>

  <form id="f" method="post" action="http://localhost:8080/" target="_blank"></form>
  <button type="submit" form="f">Open in Playground →</button>

<script>
// ── Shared base SCSS (body centering) ─────────────────────────────────────────
const BASE_SCSS = `
body {
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #f5f5f5;
  font-family: sans-serif;
}`;

const BUTTON_SCSS = `
.wrap {
  text-align: center;
  padding: 40px;
}`;

// ── Code for each framework ───────────────────────────────────────────────────
const CODE = {

  // NOTE: Lit plugin hardcodes <my-counter> in the iframe body,
  // so the custom element selector MUST be 'my-counter'.
  lit_typescript: `import { LitElement, html } from 'lit';
import { customElement, state } from 'lit/decorators.js';

@customElement('the-counter')
export class MyCounter extends LitElement {
  @state() on = false;

  render() {
    return html\`
      <div class="wrap">
        <h2>Lit — ON/OFF Toggle</h2>
        <uwc-button icon="\${this.on ? 'dash' : 'plus'}-lg"  
          @click=\${() => { this.on = !this.on; }} 
          label=\${this.on ? 'OFF' : 'ON'}
          ?outline=\${this.on}
          >
        </uwc-button>
      </div>
    \`;
  }
}`,

  // Lit uses Shadow DOM — styles injected via adoptedStyleSheets.
  // Use :host for the element itself; plain selectors target shadow-root children.
  lit_scss: `${BASE_SCSS}

:host { display: block; }

h2 {
  color: #c84b2f;
  margin: 0 0 20px;
}
${BUTTON_SCSS}`,

  // ── React ──────────────────────────────────────────────────────────────────
  react_typescript: `import React, { useState } from 'react';
import { UwcDatepicker } from '@uwc/components/react';

export default function App() {
  const [value, setValue] = useState(null);
  return (
    <>
      <UwcDatepicker
        placeholder="Pick a date"
        onUwcDateSelect={(e) => setValue(e.detail.value)}
      />
      <p>Selected: <strong>{value ? value.toLocaleDateString() : 'none'}</strong></p>
    </>
  );
}`,

  react_scss: `${BASE_SCSS}

h2 {
  color: #61dafb;
  margin: 0 0 20px;
}
${BUTTON_SCSS}`,

  // ── Vue ────────────────────────────────────────────────────────────────────
  vue_typescript: `export default {
  data() { return { on: false }; },
  template: \`
    <div class="wrap">
      <h2>Vue — ON/OFF Toggle</h2>
      <uwc-button
        :icon="on ? 'dash-lg' : 'plus-lg'"
        :label="on ? 'OFF' : 'ON'"
        :outline="on || undefined"
        @click="on = !on"
      />
    </div>
  \`
};`,

  vue_scss: `${BASE_SCSS}

h2 {
  color: #42b883;
  margin: 0 0 20px;
}
${BUTTON_SCSS}`,

  // ── Angular ────────────────────────────────────────────────────────────────
  angular_typescript: `import { Component, signal } from '@angular/core';

@Component({
  selector: 'angular-root',
  standalone: true,
  template: \`
    <div class="wrap">
      <h2>Angular — ON/OFF Toggle</h2>
      <uwc-button
        [attr.icon]="on() ? 'dash-lg' : 'plus-lg'"
        [attr.label]="on() ? 'OFF' : 'ON'"
        [attr.outline]="on() ? '' : null"
        (click)="toggle()"
      ></uwc-button>
    </div>
  \`
})
export class AppComponent {
  on = signal(false);

  toggle() {
    this.on.set(!this.on());
  }
}`,

  angular_scss: `${BASE_SCSS}

h2 {
  color: #dd0031;
  margin: 0 0 20px;
}
${BUTTON_SCSS}`,
};

// ── Build hidden form fields ──────────────────────────────────────────────────
const form = document.getElementById('f');

function field(name, value) {
  const el = document.createElement('input');
  el.type  = 'hidden';
  el.name  = name;
  el.value = value;
  form.appendChild(el);
}

field('framework', 'lit');
field('view',      'columns');
Object.entries(CODE).forEach(([k, v]) => field(k, v));

const formData = new FormData(form);
const data = Object.fromEntries(formData.entries());
console.log('Form data:', data);


</script>
</body>
</html>
